<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Search</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  .search-bar {
    width: 90%;
    max-width: 500px;
    margin-top: 40px;
    padding: 15px 20px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    outline: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .mic-btn {
    margin-top: 150px;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: none;
    background: #fff;
    color: #764ba2;
    font-size: 40px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    transition: transform 0.2s;
  }
  .mic-btn:active { transform: scale(0.95); }
  .mic-btn.listening {
    background: #ff4757;
    color: #fff;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.7); }
    50% { box-shadow: 0 0 0 20px rgba(255,71,87,0); }
  }  .count-display {
    margin-top: 25px;
    color: #fff;
    font-size: 26px;
    font-weight: bold;
    background: rgba(255,255,255,0.2);
    padding: 12px 35px;
    border-radius: 15px;
    text-align: center;
  }
  .status {
    margin-top: 15px;
    color: #fff;
    font-size: 15px;
    text-align: center;
  }
  .reset-btn {
    margin-top: 30px;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .reset-btn:hover {
    background: rgba(255,255,255,0.3);
  }
  .reset-btn.blink {
    animation: blink 0.3s;
  }
  @keyframes blink {
    0%, 100% { background: rgba(255,255,255,0.2); }
    50% { background: rgba(255,255,255,0.8); color: #764ba2; }
  }
</style>
</head>
<body>

  <input type="text" class="search-bar" id="searchBar" placeholder="Yahan text aayega...">

  <button class="mic-btn" id="micBtn">🎤</button>
  
  <div class="count-display">
    राम Count: <span id="count">0</span>
  </div>
    <p class="status" id="status">Button dabao aur bolo</p>
  
  <button class="reset-btn" id="resetBtn">Reset Count</button>

<script>
  const btn = document.getElementById('micBtn');
  const searchBar = document.getElementById('searchBar');
  const status = document.getElementById('status');
  const countDisplay = document.getElementById('count');
  const resetBtn = document.getElementById('resetBtn');

  let count = 0;
  let lastCountedText = '';
  let isListening = false;
  let processedResultIndex = 0;

  function countRam(text) {
    const matches = text.match(/ram|राम/gi);
    return matches ? matches.length : 0;
  }

  searchBar.addEventListener('input', () => {
    const currentText = searchBar.value;
    if (currentText.length > lastCountedText.length) {
      const newText = currentText.substring(lastCountedText.length);
      const newCount = countRam(newText);
      if (newCount > 0) {
        count += newCount;
        countDisplay.textContent = count;
      }
    }
    lastCountedText = currentText;
  });

  let clickTimes = [];
  resetBtn.addEventListener('click', () => {
    resetBtn.classList.add('blink');
    setTimeout(() => resetBtn.classList.remove('blink'), 300);
    
    const now = Date.now();
    clickTimes.push(now);
    
    if (clickTimes.length > 3) {
      clickTimes.shift();
    }
    
    if (clickTimes.length === 3) {
      const timeDiff = clickTimes[2] - clickTimes[0];
      if (timeDiff <= 1000) {
        count = 0;        countDisplay.textContent = '0';
        status.textContent = "✅ Count reset ho gaya!";
        clickTimes = [];
      }
    }
  });

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    status.textContent = "Tere browser mein voice support nahi hai";
    btn.disabled = true;
  } else {
    const recognition = new SpeechRecognition();
    recognition.lang = 'hi-IN';
    recognition.continuous = true;
    recognition.interimResults = false;

    btn.addEventListener('click', () => {
      if (!isListening) {
        try {
          recognition.start();
          isListening = true;
          processedResultIndex = 0;
          btn.classList.add('listening');
          status.textContent = "🎧 Sun raha hoon... bol";
        } catch(e) {
          status.textContent = "Error: " + e.message;
        }
      }
    });

    recognition.onresult = (event) => {
      let finalText = '';
      
      for (let i = processedResultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          const transcript = event.results[i][0].transcript.trim();
          if (transcript) {
            finalText += transcript + ' ';
          }
        }
      }
      
      processedResultIndex = event.results.length;
      
      if (finalText) {
        searchBar.value = searchBar.value ? searchBar.value + ' ' + finalText.trim() : finalText.trim();
        
        if (searchBar.value.length > lastCountedText.length) {          const newText = searchBar.value.substring(lastCountedText.length);
          const newCount = countRam(newText);
          if (newCount > 0) {
            count += newCount;
            countDisplay.textContent = count;
          }
          lastCountedText = searchBar.value;
        }
      }
    };

    recognition.onend = () => {
      if (isListening) {
        try {
          recognition.start();
        } catch(e) {}
      }
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech' || e.error === 'aborted') {
        // Ignore
      } else {
        status.textContent = "Error: " + e.error;
      }
    };
  }

  setInterval(() => {
    if (searchBar.value.trim()) {
      if (searchBar.value.length > lastCountedText.length) {
        const newText = searchBar.value.substring(lastCountedText.length);
        const newCount = countRam(newText);
        if (newCount > 0) {
          count += newCount;
          countDisplay.textContent = count;
        }
      }
    }
    searchBar.value = '';
    lastCountedText = '';
    processedResultIndex = 0;
  }, 5000);
</script>

</body>
</html></body>
</html>
