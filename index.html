<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ram Jaap Counter</title>
    <style>
        /* पूरा बैकग्राउंड काला */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none; /* टेक्स्ट सिलेक्ट न हो */
            -webkit-tap-highlight-color: transparent;
        }

        /* ऊपर का हेडर */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #222;
        }

        .title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff9933; /* भगवा रंग */
            letter-spacing: 1px;
        }

        /* रीसेट बटन */
        .reset-btn {
            background-color: #1a1a1a;
            color: #ff9933;
            border: 1px solid #ff9933;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .reset-btn:active {
            background-color: #ff9933;
            color: #000;
            transform: scale(0.95);
        }

        /* बीच का काउंटर सेक्शन */
        .counter-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        #counter {
            font-size: 10rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 10px;
            transition: transform 0.15s ease, color 0.15s ease;
            line-height: 1;
        }

        #status {
            color: #666;
            font-size: 1rem;
            margin-bottom: 30px;
            height: 24px; /* जगह फिक्स रखने के लिए */
        }

        /* मुख्य बटन */
        #micBtn {
            padding: 16px 40px;
            font-size: 1.2rem;
            background-color: #ff9933;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(255, 153, 51, 0.4);
            transition: all 0.2s;
            width: 80%;
            max-width: 300px;
        }
        #micBtn:active {
            transform: scale(0.96);
        }

        #micBtn.stop-mode {
            background-color: #cc0000;
            color: #fff;
            box-shadow: 0 4px 20px rgba(204, 0, 0, 0.4);
        }

        /* लाइव कैप्शन (Auto-caption) */
        #caption {
            margin-top: 25px;
            font-size: 1.1rem;
            color: #aaaaaa;
            font-style: italic;
            min-height: 30px;
            opacity: 0; /* शुरू में छिपा रहेगा */
            transition: opacity 0.3s ease-in-out;
            background-color: #111;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #333;
            max-width: 90%;
            word-wrap: break-word;
        }

        #caption.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- ऊपर का हिस्सा -->
    <div class="header">
        <div class="title">राम राम राम राम राम</div>
        <button id="resetBtn" class="reset-btn">Reset</button>
    </div>

    <!-- बीच का हिस्सा -->
    <div class="counter-container">
        <div id="counter">0</div>
        <div id="status">माइक बंद है</div>
        
        <button id="micBtn">🎤 सुनना शुरू करें</button>
        
        <!-- यहाँ बोला गया शब्द 2 सेकंड के लिए दिखेगा -->
        <div id="caption"></div>
    </div>
    <script>
        // --- वेरिएबल्स ---
        let count = 0;
        let isListening = false;
        let captionTimer = null;

        const counterElement = document.getElementById('counter');
        const resetBtn = document.getElementById('resetBtn');
        const micBtn = document.getElementById('micBtn');
        const statusElement = document.getElementById('status');
        const captionElement = document.getElementById('caption');

        // --- 1. रीसेट बटन: 3 बार लगातार टैप (800ms के अंदर) ---
        let tapCount = 0;
        let lastTapTime = 0;
        const tapDelay = 800;

        resetBtn.addEventListener('click', (e) => {
            e.preventDefault(); 
            const currentTime = new Date().getTime();
            
            if (currentTime - lastTapTime < tapDelay) {
                tapCount++;
            } else {
                tapCount = 1;
            }
            lastTapTime = currentTime;

            if (tapCount === 3) {
                count = 0;
                counterElement.innerText = count;
                tapCount = 0;
                
                // विजुअल फीडबैक
                resetBtn.innerText = "✓ रीसेट";
                setTimeout(() => { resetBtn.innerText = "Reset"; }, 600);
            }
        });

        // --- 2. वॉइस रिकग्निशन सेटअप ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN'; // हिंदी
            recognition.continuous = true; // लगातार सुनता रहे
            recognition.interimResults = true; // तुरंत टेक्स्ट दिखाने के लिए (स्मूथ फीलिंग)
            // जब माइक चालू हो
            recognition.onstart = () => {
                isListening = true;
                micBtn.innerText = "⏹️ रोकें (Stop)";
                micBtn.classList.add('stop-mode');
                statusElement.innerText = "सुन रहा हूँ... ('राम' बोलें)";
                statusElement.style.color = "#00ff00";
            };

            // जब माइक बंद हो (या अपने आप रुक जाए)
            recognition.onend = () => {
                // अगर यूजर ने मैन्युअली स्टॉप नहीं किया, तो बटन रीसेट कर दें
                if (isListening) {
                    // कभी-कभी ब्राउज़र साइलेंस की वजह से अपने आप बंद कर देता है
                    // हम उसे वापस चालू कर सकते हैं, या यूजर को मैन्युअली चालू करने दे सकते हैं।
                    // यहाँ हम मैन्युअल कंट्रोल को प्राथमिकता दे रहे हैं।
                    isListening = false;
                    micBtn.innerText = "🎤 सुनना शुरू करें";
                    micBtn.classList.remove('stop-mode');
                    statusElement.innerText = "माइक बंद हो गया";
                    statusElement.style.color = "#666";
                }
            };

            // जब आवाज़ पहचानी जाए
            recognition.onresult = (event) => {
                let finalTranscript = '';
                let interimTranscript = '';

                // सभी रिजल्ट्स को चेक करें
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                // स्क्रीन पर दिखाएं कि फोन क्या सुन रहा है (Final या Interim)
                const textToShow = finalTranscript || interimTranscript;
                if (textToShow.trim() !== '') {
                    showCaption(textToShow.trim());
                }

                // --- काउंटिंग लॉजिक ---
                // हम सिर्फ 'finalTranscript' पर काउंट करेंगे ताकि एक ही शब्द बार-बार न गिना जाए
                if (finalTranscript) {
                    const cleanText = finalTranscript.toLowerCase().trim();
                    
                    // चेक करें कि टेक्स्ट में 'राम' या 'ram' आया है या नहीं                    // यह regex 'राम' या 'ram' की सभी occurrences (आवृत्तियों) को गिनेगा
                    const ramMatches = cleanText.match(/राम|ram/g);
                    
                    if (ramMatches && ramMatches.length > 0) {
                        count += ramMatches.length; // जितनी बार 'राम' आया, उतना जोड़ें
                        counterElement.innerText = count;
                        
                        // काउंटर बढ़ने पर हल्का सा एनिमेशन (पल्स)
                        counterElement.style.transform = "scale(1.15)";
                        counterElement.style.color = "#ff9933";
                        setTimeout(() => {
                            counterElement.style.transform = "scale(1)";
                            counterElement.style.color = "#ffffff";
                        }, 150);
                    }
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech Error:", event.error);
                if (event.error === 'not-allowed') {
                    statusElement.innerText = "माइक की अनुमति नहीं दी गई!";
                    statusElement.style.color = "red";
                }
            };

        } else {
            statusElement.innerText = "आपका ब्राउज़र वॉइस सपोर्ट नहीं करता। Chrome का उपयोग करें।";
            statusElement.style.color = "red";
            micBtn.style.display = 'none';
        }

        // --- 3. माइक चालू/बंद करने का बटन ---
        micBtn.addEventListener('click', () => {
            if (!recognition) return;

            if (!isListening) {
                try {
                    recognition.start();
                } catch (e) {
                    console.log("पहले से चालू है");
                }
            } else {
                recognition.stop();
                isListening = false; // मैन्युअली स्टॉप किया, तो onend में यह true नहीं रहेगा
                micBtn.innerText = "🎤 सुनना शुरू करें";
                micBtn.classList.remove('stop-mode');
                statusElement.innerText = "माइक बंद है";
                statusElement.style.color = "#666";
                hideCaption();            }
        });

        // --- 4. कैप्शन दिखाने और 2 सेकंड बाद छिपाने का फंक्शन ---
        function showCaption(text) {
            captionElement.innerText = "सुना: " + text;
            captionElement.classList.add('visible');

            // पुराना टाइमर क्लियर करें ताकि लगातार बोलने पर यह झपके नहीं
            if (captionTimer) {
                clearTimeout(captionTimer);
            }

            // 2 सेकंड (2000 ms) बाद छिपा दें
            captionTimer = setTimeout(() => {
                hideCaption();
            }, 2000);
        }

        function hideCaption() {
            captionElement.classList.remove('visible');
        }

    </script>
</body>
</html>
